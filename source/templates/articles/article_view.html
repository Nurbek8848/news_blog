{% extends "base.html" %}
{% block nav %}
    <a class="nav-link" href="/articles/add/">Добавить статью</a>
{% endblock %}
{% block content %}
    <div class="card my-5">
        <div class="card-header fs-4 text-center">{{ article.title }}</div>
        <div class="card-body">
            <figure>
                <blockquote class="blockquote">
                    <p>{{ article.content }}</p>
                </blockquote>
                <figcaption class="blockquote-footer mt-3">
                    {{ article.author }}
                </figcaption>
            </figure>
        </div>
    </div>
{% endblock %}
