{% extends "base.html" %}
{% block nav %}
    <a class="nav-link" href="{% url 'create' %}">Добавить статью</a>
{% endblock %}
{% block content %}
    <div class="card my-5">
        <div class="card-header fs-4 text-center">{{ article.title }}</div>
        <div class="card-body">
            <figure>
                <blockquote class="blockquote">
                    <p>{{ article.content }}</p>
                </blockquote>
                <p>Статус: {{ article.get_status_display }}</p>
                <p>Блог: {{ article.blog }}</p>
                <p>Блог: {{ article.blog.title }}</p>
                <p>Блог: {{ article.blog.articles.all }}</p>
                <figcaption class="blockquote-footer mt-3">
                    Автор: {{ article.author }}
                </figcaption>
            </figure>
        </div>
    </div>
{% endblock %}
